<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LOGサウナ点検">
<meta name="theme-color" content="#ffffff">
<title>LOG サウナストーブ 点検・日報</title>
<style>
  :root{
    --bg:#ffffff;
    --water:#3FAFD4;        /* LOG水色 primary */
    --water-deep:#1C6E8C;   /* 濃い水色：見出し・文字 */
    --water-soft:#EAF6FB;   /* 淡い水色：カード地 */
    --water-line:#D5E9F1;   /* 罫線 */
    --ink:#15303A;          /* 本文 */
    --ink-sub:#5A7681;      /* 補足 */
    --ok:#2E9E6B;
    --warn:#E0972E;
    --bad:#D8514C;
    --shadow:0 1px 0 rgba(28,110,140,.04), 0 8px 24px rgba(28,110,140,.07);
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);background:var(--bg);
    -webkit-font-smoothing:antialiased;line-height:1.6;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{max-width:680px;margin:0 auto;min-height:100vh}

  /* Header */
  header.bar{
    position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);
    backdrop-filter:saturate(1.4) blur(8px);
    border-bottom:1px solid var(--water-line);
    padding:calc(env(safe-area-inset-top) + 10px) 16px 0;
  }
  .bar-row{display:flex;align-items:center;gap:12px;min-height:48px}
  .brand{display:flex;align-items:baseline;gap:8px;font-weight:800;letter-spacing:.02em}
  .brand .log{color:var(--water-deep);font-size:20px}
  .brand .sub{color:var(--ink-sub);font-size:12px;font-weight:600}
  .back{appearance:none;border:none;background:var(--water-soft);color:var(--water-deep);
    font-weight:700;border-radius:12px;padding:8px 12px;font-size:14px;display:flex;align-items:center;gap:6px;cursor:pointer}
  .spacer{flex:1}
  /* 等高線/水の一筋モチーフ */
  .contour{height:8px;margin:8px 0 0;display:block;width:100%}

  /* Page title */
  .ptitle{padding:18px 18px 4px}
  .ptitle h1{margin:0;font-size:22px;letter-spacing:.01em;color:var(--ink)}
  .ptitle p{margin:4px 0 0;color:var(--ink-sub);font-size:13px}

  /* Home grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
  .tile{
    position:relative;border:1px solid var(--water-line);background:#fff;border-radius:var(--radius);
    padding:16px 14px 14px;min-height:118px;cursor:pointer;box-shadow:var(--shadow);
    display:flex;flex-direction:column;justify-content:space-between;transition:transform .08s ease, box-shadow .15s ease;
    overflow:hidden;
  }
  .tile:active{transform:scale(.975)}
  .tile .ico{width:34px;height:34px;color:var(--water-deep)}
  .tile .label{font-weight:800;font-size:16px;margin-top:10px}
  .tile .meta{font-size:11.5px;color:var(--ink-sub);margin-top:2px;font-weight:600}
  .tile .wash{position:absolute;right:-18px;bottom:-18px;width:78px;height:78px;border-radius:50%;
    background:var(--water-soft);z-index:0}
  .tile>*{position:relative;z-index:1}
  .tile.alert .dot{position:absolute;top:12px;right:12px;width:10px;height:10px;border-radius:50%;background:var(--bad);z-index:2;box-shadow:0 0 0 4px #fff}

  /* Section / cards */
  .wrap{padding:8px 16px 40px}
  .card{background:#fff;border:1px solid var(--water-line);border-radius:var(--radius);box-shadow:var(--shadow);margin:12px 0;overflow:hidden}
  .card h2{margin:0;padding:14px 16px;font-size:15px;color:var(--water-deep);border-bottom:1px solid var(--water-line);background:var(--water-soft);letter-spacing:.02em}
  .card .body{padding:6px 16px 14px}

  /* Check rows */
  .check{display:flex;align-items:flex-start;gap:12px;padding:13px 4px;border-bottom:1px solid var(--water-line);cursor:pointer;user-select:none}
  .check:last-child{border-bottom:none}
  .box{flex:0 0 26px;width:26px;height:26px;border-radius:8px;border:2px solid var(--water);background:#fff;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:all .12s ease}
  .box svg{width:16px;height:16px;color:#fff;opacity:0;transform:scale(.6);transition:all .12s ease}
  .check.on .box{background:var(--water);border-color:var(--water)}
  .check.on .box svg{opacity:1;transform:scale(1)}
  .check .txt{flex:1;font-size:14.5px}
  .check .txt small{display:block;color:var(--ink-sub);font-size:12px;margin-top:2px}
  .check.key .txt b{color:var(--bad)}
  .pill{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:1px}
  .pill.k{background:#FBE9E8;color:var(--bad)}
  .pill.c{background:#FDF1DD;color:#B9791B}

  /* Manual text */
  .mtext h3{font-size:14px;color:var(--water-deep);margin:16px 0 4px}
  .mtext p,.mtext li{font-size:14px;color:var(--ink)}
  .mtext ul{margin:4px 0 8px;padding-left:18px}
  .mtext .note{background:var(--water-soft);border-radius:12px;padding:10px 12px;font-size:13px;color:var(--ink)}

  /* Parts tracker */
  .part{padding:12px 4px;border-bottom:1px solid var(--water-line)}
  .part:last-child{border-bottom:none}
  .part .ph{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .part .pn{font-weight:800;font-size:14.5px}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px}
  .badge.ok{background:#E5F4ED;color:var(--ok)}
  .badge.soon{background:#FDF1DD;color:#B9791B}
  .badge.over{background:#FBE9E8;color:var(--bad)}
  .part .pmeta{font-size:12px;color:var(--ink-sub);margin-top:3px}
  .part .prow{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .part input[type=date]{font:inherit;padding:7px 9px;border:1px solid var(--water-line);border-radius:10px;color:var(--ink)}
  .mini{appearance:none;border:1px solid var(--water);background:#fff;color:var(--water-deep);font-weight:700;
    padding:7px 12px;border-radius:10px;font-size:13px;cursor:pointer}

  /* Inputs */
  .field{margin:12px 0}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-sub);margin-bottom:5px}
  .field input[type=text],.field textarea,.field select{
    width:100%;font:inherit;padding:12px 12px;border:1px solid var(--water-line);border-radius:12px;color:var(--ink);background:#fff}
  .field textarea{min-height:78px;resize:vertical}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;appearance:none;border:1px solid var(--water-line);background:#fff;color:var(--ink-sub);
    font-weight:700;padding:10px;border-radius:12px;font-size:13.5px;cursor:pointer}
  .seg button.on{background:var(--water);border-color:var(--water);color:#fff}

  .submit{position:sticky;bottom:0;background:linear-gradient(transparent,#fff 22%);padding:14px 16px calc(env(safe-area-inset-bottom) + 14px)}
  .btn{display:block;width:100%;appearance:none;border:none;background:var(--water);color:#fff;font-weight:800;
    font-size:16px;padding:16px;border-radius:14px;cursor:pointer;box-shadow:0 8px 20px rgba(63,175,212,.35)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--water-deep);border:1px solid var(--water);box-shadow:none;margin-top:8px;font-size:14px;padding:12px}
  .progress{font-size:12.5px;color:var(--ink-sub);text-align:center;padding:0 0 10px;font-weight:700}

  /* Records */
  .rec{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--water-line);border-radius:14px;
    padding:13px 14px;margin:10px 0;cursor:pointer;box-shadow:var(--shadow)}
  .rec .rt{display:flex;align-items:center;gap:8px}
  .rec .typ{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--water-soft);color:var(--water-deep)}
  .rec .dt{font-weight:800;font-size:14.5px}
  .rec .who{color:var(--ink-sub);font-size:12.5px;margin-top:3px}
  .rec .ab{margin-left:auto;font-size:11px;font-weight:800;color:var(--bad)}
  .rdetail{font-size:13px;color:var(--ink);margin-top:8px;border-top:1px dashed var(--water-line);padding-top:8px;display:none}
  .rec.open .rdetail{display:block}
  .filt{display:flex;gap:8px;overflow:auto;padding:4px 0 8px}
  .filt button{white-space:nowrap;appearance:none;border:1px solid var(--water-line);background:#fff;color:var(--ink-sub);
    font-weight:700;padding:7px 13px;border-radius:999px;font-size:13px;cursor:pointer}
  .filt button.on{background:var(--water-deep);border-color:var(--water-deep);color:#fff}

  .src{font-size:11.5px;color:var(--ink-sub);background:var(--water-soft);border-radius:12px;padding:10px 12px;margin-top:10px}
  .call{display:inline-flex;align-items:center;gap:6px;font-weight:800;color:var(--water-deep);text-decoration:none;
    border:1px solid var(--water);border-radius:10px;padding:8px 12px;margin:4px 6px 4px 0;font-size:13.5px}

  .empty{text-align:center;color:var(--ink-sub);padding:48px 20px;font-size:14px}
  .empty svg{width:46px;height:46px;color:var(--water-line);margin-bottom:8px}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:13px 20px;border-radius:14px;font-weight:700;font-size:14px;
    opacity:0;pointer-events:none;transition:all .25s ease;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .modebar{font-size:11px;color:var(--ink-sub);text-align:center;padding:10px 16px 24px}
  .modebar b{color:var(--water-deep)}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="bar-row">
      <button class="back" id="backBtn" style="display:none" onclick="go('home')">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>戻る
      </button>
      <div class="brand"><span class="log">LOG</span><span class="sub">サウナストーブ点検・日報</span></div>
      <div class="spacer"></div>
    </div>
    <svg class="contour" viewBox="0 0 680 8" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0 5 Q60 1 120 5 T240 5 T360 5 T480 5 T600 5 T720 5" fill="none" stroke="#3FAFD4" stroke-width="1.4" opacity=".5"/>
      <path d="M0 7 Q60 3 120 7 T240 7 T360 7 T480 7 T600 7 T720 7" fill="none" stroke="#3FAFD4" stroke-width="1" opacity=".25"/>
    </svg>
  </header>
  <main id="view"></main>
</div>
<div class="toast" id="toast"></div>

<script>

   ========================================================================= */

  authDomain: "log-sauna.firebaseapp.com",

  storageBucket: "log-sauna.firebasestorage.app",
  messagingSenderId: "732507396989",

      {t:"煙突は可燃物から、火床1.8m以内=45cm／1.8m超=30cm以上離す", s:"標準値・要確認", cite:true},

const PARTS = [
  {id:"stone", n:"サウナストーン", months:6, note:"6か月〜1年で点検・入替（高頻度施設は2〜3か月）。崩れ・変色で交換"},

  {id:"body", n:"本体（フレーム）点検", months:1, note:"腐食穴・薄肉化が出たらディーラー相談。毎月の重点目視を継続"},

const TILES = [
  {id:"daily", label:"日次点検", meta:"毎運転日", ico:icoFlame, color:"#D8514C"},
  {id:"weekly", label:"週次点検", meta:"週1回", ico:icoCal, color:"#3FAFD4"},
  {id:"monthly", label:"月次点検", meta:"月1回・保管", ico:icoCal2, color:"#1C6E8C"},

/* ---------------- アイコン（インラインSVG） ---------------- */
function svg(p){return `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`}
function icoFlame(){return svg('<path d="M12 3c1 3 4 4 4 8a4 4 0 1 1-8 0c0-1.5.6-2.3 1.3-3 .2 1 .9 1.6 1.7 1.6C12 8 10.5 6 12 3z"/>')}
function icoCal(){return svg('<rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9h17M8 2.5v4M16 2.5v4"/>')}
function icoCal2(){return svg('<rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9h17M8 2.5v4M16 2.5v4M8 13h3M8 16.5h6"/>')}
function icoWrench(){return svg('<path d="M14.5 6a3.5 3.5 0 0 0-4.6 4.3L4 16.2 6 18l5.9-5.9A3.5 3.5 0 0 0 16 7.6L13.7 9.9 12 8.3 14.5 6z"/>')}
function icoBook(){return svg('<path d="M5 4.5h9a2 2 0 0 1 2 2V20a1.5 1.5 0 0 0-1.5-1.5H5z"/><path d="M5 4.5v14M16 6.5h2.5V20H17"/>')}
function icoFire(){return svg('<path d="M12 21a6 6 0 0 0 6-6c0-4-3-5-3-9-2 1.5-3 3-3 5-1-1-1.2-2-1-3.5C8 9 6 11 6 15a6 6 0 0 0 6 6z"/>')}
function icoList(){return svg('<path d="M8 6.5h12M8 12h12M8 17.5h12M4 6.5h.01M4 12h.01M4 17.5h.01"/>')}
function checkmark(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>'}

/* =====================================================================
   ストレージ・アダプタ（環境自動判定）
   ===================================================================== */
let DB = null, MODE = "memory";
const KEY_REPORTS="logsauna:reports", KEY_PARTS="logsauna:parts";

async function bootStore(){
  // 1) Claude.ai プレビュー
  if (typeof window!=="undefined" && window.storage && typeof window.storage.set==="function"){
    MODE="claude"; DB=claudeAdapter(); return;
  }
  // 2) Firebase（GitHub本番）
  if (FIREBASE_CONFIG.projectId){
    try{ await loadFirebase(); MODE="firebase"; DB=firebaseAdapter(); return; }
    catch(e){ console.warn("Firebase初期化失敗→ローカルにフォールバック", e); }
  }
  // 3) localStorage（設定前のローカル確認）
  try{
    const t="__t"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t);
    MODE="local"; DB=localAdapter(); return;
  }catch(e){ /* 4) memory */ }
  MODE="memory"; DB=memoryAdapter();
}

/* --- Claude.ai（window.storage 共有） --- */
function claudeAdapter(){
  const get=async(k)=>{ try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch(e){return null;} };
  const set=(k,v)=>window.storage.set(k,JSON.stringify(v),true);
  const dget=async(k)=>{ try{const r=await window.storage.get(k,false);return r?r.value:null;}catch(e){return null;} };
  const dset=(k,v)=>window.storage.set(k,v,false);
  return adapterFrom(get,set,dget,dset);
}
/* --- localStorage --- */
function localAdapter(){
  const get=async(k)=>{const v=localStorage.getItem(k);return v?JSON.parse(v):null;};
  const set=async(k,v)=>localStorage.setItem(k,JSON.stringify(v));
  const dget=async(k)=>localStorage.getItem("dev:"+k);
  const dset=async(k,v)=>localStorage.setItem("dev:"+k,v);
  return adapterFrom(get,set,dget,dset);
}
/* --- memory（最終手段：保存はされません） --- */
function memoryAdapter(){
  const m={};
  const get=async(k)=>m[k]??null, set=async(k,v)=>{m[k]=v;};
  const dget=async(k)=>m["d:"+k]??null, dset=async(k,v)=>{m["d:"+k]=v;};
  return adapterFrom(get,set,dget,dset);
}
/* 共通：単一配列read-modify-write方式（Claude/local/memory用） */
function adapterFrom(get,set,dget,dset){
  return {
    async addReport(r){ const a=(await get(KEY_REPORTS))||[]; a.push(r); await set(KEY_REPORTS,a); },
    async getReports(){ return (await get(KEY_REPORTS))||[]; },
    async getParts(){ return (await get(KEY_PARTS))||{}; },
    async setPart(id,date){ const p=(await get(KEY_PARTS))||{}; p[id]=date; await set(KEY_PARTS,p); },
    async devGet(k){ return await dget(k); },
    async devSet(k,v){ return await dset(k,v); }
  };
}
/* --- Firebase（add方式：多端末同時でも取りこぼし無し） --- */
function loadFirebase(){
  return new Promise((res,rej)=>{
    const add=(src)=>new Promise((ok,ng)=>{const s=document.createElement("script");s.src=src;s.onload=ok;s.onerror=ng;document.head.appendChild(s);});
    add("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js")
      .then(()=>add("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"))
      .then(()=>{ firebase.initializeApp(FIREBASE_CONFIG); res(); }).catch(rej);
  });
}
function firebaseAdapter(){
  const db=firebase.firestore();
  return {
    async addReport(r){ await db.collection("reports").add(r); },
    async getReports(){ const q=await db.collection("reports").orderBy("ts","desc").get(); return q.docs.map(d=>d.data()); },
    async getParts(){ const d=await db.collection("meta").doc("parts").get(); return d.exists?d.data():{}; },
    async setPart(id,date){ await db.collection("meta").doc("parts").set({[id]:date},{merge:true}); },
    async devGet(k){ try{return localStorage.getItem("dev:"+k);}catch(e){return null;} },
    async devSet(k,v){ try{localStorage.setItem("dev:"+k,v);}catch(e){} }
  };
}

        ${type==='daily'?`<div class="field"><label>区分</label><div class="seg" id="shift">
          ${["午前","午後","終日"].map((s,i)=>`<button class="${i===2?'on':''}" onclick="pickShift(this)">${s}</button>`).join("")}
        </div></div>`:''}
      </div></div>`}
      <div class="card"><h2>点検項目</h2><div class="body" id="items">
        ${C.items.map((it,i)=>`
          <div class="check${it.key?' key':''}" data-i="${i}" onclick="toggle(${i})">

            <div class="txt">${it.t}${it.key?'<span class="pill k">重点</span>':''}${it.cite?'<span class="pill c">要確認</span>':''}${it.s?`<small>${it.s}</small>`:''}</div>
          </div>`).join("")}
      </div></div>

      <div class="progress" id="prog"></div>

  updateProg(type);
}
function toggle(i){ chState[i]=!chState[i]; const el=V.querySelector(`.check[data-i="${i}"]`); el.classList.toggle("on",chState[i]); updateProg(curType()); }
let _shift="終日";
function pickShift(b){ [...b.parentNode.children].forEach(x=>x.classList.remove("on")); b.classList.add("on"); _shift=b.textContent; }
function curType(){ return (document.querySelector(".ptitle h1")||{}).textContent; }
function updateProg(){ const total=document.querySelectorAll(".check").length; const done=Object.values(chState).filter(Boolean).length;
  const p=document.getElementById("prog"); if(p) p.textContent=`${done} / ${total} 項目を確認`; }

function fireRef(){
  return `<div class="card"><h2>管轄・連絡先（保存版）</h2><div class="body">
    <a class="call" href="tel:0243332875">📞 南消防署 予防係 0243-33-2875</a>
    <a class="call" href="tel:0243221211">📞 消防本部 0243-22-1211</a>
    <div class="src">
      根拠：<b>安達地方広域行政組合火災予防条例</b>（消防法第9条／火を使用する設備の位置・構造・管理の基準）。管轄は安達地方広域行政組合消防本部・<b>南消防署（本宮市/大玉村）</b>。FAX 0243-22-1355。届出書類は<b>2部</b>作成し1部に受付印を受けて返付。<br>
      ※離隔距離など数値は全国標準値を記載しています。<b>最終確定は南消防署 予防係に図面を持参して確認</b>してください。
    </div>
  </div></div>`;
}

async function submitCheck(type){
  const total=CHECKS[type].items.length, done=Object.keys(chState).filter(k=>chState[k]).length;
  const staffEl=document.getElementById("staff");
  if(staffEl){ staffName=staffEl.value.trim(); if(!staffName){ toast("担当者名を入力してください"); staffEl.focus(); return; } await DB.devSet("staff",staffName); }
  const notes=(document.getElementById("notes")||{}).value||"";
  const items={}; CHECKS[type].items.forEach((it,i)=>items[strip(it.t)]=!!chState[i]);
  const abnormal = done<total || notes.trim().length>0;
  const rep={ ts:Date.now(), type, typeLabel:CHECKS[type].title, date:dateStr(), staff:staffName||"-",
    shift: type==="daily"?_shift:"", done, total, abnormal, notes:notes.trim(), items };
  try{ await DB.addReport(rep); toast(done<total?"記録しました（未確認項目あり）":"点検完了・記録しました ✓"); setTimeout(()=>go("home"),650); }
  catch(e){ toast("保存に失敗しました"); console.error(e); }
}

async function renderParts(){

    <div class="wrap"><div class="card"><div class="body">
      ${PARTS.map(p=>{ const d=last[p.id]||""; const st=partStatus(p,d);
        return `<div class="part">
          <div class="ph"><span class="pn">${p.n}</span><span class="badge ${st.k}">${st.label}</span></div>
          <div class="pmeta">目安：${p.months>=12?(p.months/12)+"年":p.months+"か月"}毎　${d?'／ 次回目安 '+st.next:''}</div>
          <div class="pmeta">${p.note}</div>
          <div class="prow">
            <input type="date" id="pd_${p.id}" value="${d}">
            <button class="mini" onclick="savePart('${p.id}')">最終実施日を更新</button>
            <button class="mini" onclick="setToday('${p.id}')">今日にする</button>
          </div>
        </div>`;}).join("")}
    </div></div>
    <div class="modebar">部品交換の履歴も「記録を見る」に残すと、消防の点検整備の証跡になります。</div>
    </div>`;
}
function partStatus(p,d){
  if(!d) return {k:"soon",label:"未設定",next:"-"};
  const next=new Date(d); next.setMonth(next.getMonth()+p.months);
  const ns=next.toISOString().slice(0,10); const diff=(next-new Date())/(86400000);
  if(diff<0) return {k:"over",label:"交換時期 超過",next:ns};
  if(diff<30) return {k:"soon",label:"まもなく",next:ns};
  return {k:"ok",label:"良好",next:ns};
}
async function savePart(id){ const v=document.getElementById("pd_"+id).value; if(!v){toast("日付を選んでください");return;} await DB.setPart(id,v); toast("更新しました"); renderParts(); }
async function setToday(id){ await DB.setPart(id,dateStr()); toast("今日に更新しました"); renderParts(); }

let _filter="all";
async function renderRecords(){
  let reps=await DB.getReports(); reps=reps.slice().sort((a,b)=>b.ts-a.ts);
  const f=_filter, list = f==="all"?reps:reps.filter(r=>r.type===f);
  V.innerHTML=`
    <div class="ptitle"><h1>記録を見る</h1><p>日報・点検履歴（全端末で共有）</p></div>
    <div class="wrap">
      <div class="filt">
        ${[["all","すべて"],["daily","日次"],["weekly","週次"],["monthly","月次"],["fire","消防"]].map(([k,l])=>
          `<button class="${f===k?'on':''}" onclick="setFilter('${k}')">${l}</button>`).join("")}
      </div>
      ${list.length? list.map((r,i)=>`
        <button class="rec" onclick="this.classList.toggle('open')">
          <div class="rt">
            <span class="typ">${r.typeLabel||r.type}</span>
            <span class="dt">${r.date}</span>
            ${r.abnormal?'<span class="ab">要確認</span>':'<span class="ab" style="color:var(--ok)">完了</span>'}
          </div>
          <div class="who">${esc(r.staff)}${r.shift?'・'+r.shift:''}　${r.done}/${r.total}項目</div>
          <div class="rdetail">
            ${r.notes?`<div style="margin-bottom:6px"><b>特記：</b>${esc(r.notes)}</div>`:''}
            ${Object.entries(r.items||{}).map(([k,v])=>`<div>${v?'✅':'⬜️'} ${esc(k)}</div>`).join("")}
          </div>
        </button>`).join("")
       : `<div class="empty">${icoList()}<div>まだ記録がありません。<br>点検を実施すると、ここに全員分が集約されます。</div></div>`}
      ${reps.length?`<button class="btn ghost" onclick="exportCSV()">CSVで書き出して保管</button>`:''}
    </div>`;
}
function setFilter(k){ _filter=k; renderRecords(); }
async function exportCSV(){
  const reps=(await DB.getReports()).slice().sort((a,b)=>a.ts-b.ts);
  const rows=[["日時","種別","担当","区分","確認数","総数","異常","特記"]];
  reps.forEach(r=>rows.push([new Date(r.ts).toLocaleString("ja-JP"),r.typeLabel||r.type,r.staff,r.shift||"",r.done,r.total,r.abnormal?"要確認":"完了",(r.notes||"").replace(/\n/g," ")]));
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`LOGサウナ点検記録_${dateStr()}.csv`; a.click();
}

/* ---- utils ---- */
function dateStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function todayLabel(){ const d=new Date(); const w="日月火水木金土"[d.getDay()];
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${w}）`; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function strip(s){ return s.replace(/<[^>]+>/g,""); }
function modeLabel(){ return {claude:"プレビュー共有", firebase:"Firebase（全端末共有）", local:"この端末のみ（ローカル）", memory:"一時メモリ（未保存）"}[MODE]; }
function modeHint(){ return {claude:"このプレビューで動作確認できます", firebase:"本番運用OK", local:"Firebase設定で全端末共有に切替", memory:"設定が必要です"}[MODE]; }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

/* boot */
(async()=>{ await bootStore(); go("home"); })();
